services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: agendamento
      POSTGRES_PASSWORD: agendamento_dev
      POSTGRES_DB: agendamento
    ports:
      - "5432:5432"
    volumes:
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
